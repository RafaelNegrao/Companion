<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observações</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: rgba(42, 42, 46, 0.95);
      color: #e5e5ea;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      -webkit-app-region: drag;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #e5e5ea;
    }

    .buttons {
      display: flex;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-save {
      background: #0071e3;
      color: #fff;
    }

    .btn-save:hover {
      background: #0062cc;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.4);
    }

    .btn-cancel {
      background: rgba(60, 60, 67, 0.6);
      color: #8e8e93;
    }

    .btn-cancel:hover {
      background: rgba(70, 70, 77, 0.8);
      color: #e5e5ea;
    }

    .obs-area {
      flex: 1;
      width: 100%;
      background: rgba(60, 60, 67, 0.6);
      border: none;
      border-radius: 12px;
      color: #e5e5ea;
      padding: 15px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .obs-area:focus {
      border-color: rgba(10, 132, 255, 0.6);
      background: rgba(70, 70, 77, 0.8);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
    }

    .obs-area::placeholder {
      color: #636366;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Observações</h2>
    <div class="buttons">
      <button class="btn-cancel" id="cancel-btn">Cancelar</button>
      <button class="btn-save" id="save-btn">Salvar</button>
    </div>
  </div>
  
  <textarea class="obs-area" id="obs-textarea" placeholder="Digite suas observações..."></textarea>

  <script>
    // Carrega observações salvas
    const textarea = document.getElementById('obs-textarea');
    const savedObs = localStorage.getItem('observacoes') || '';
    textarea.value = savedObs;
    
    // Salvar
    document.getElementById('save-btn').addEventListener('click', () => {
      localStorage.setItem('observacoes', textarea.value);
      window.electronAPI.closeObsWindow(textarea.value);
    });
    
    // Cancelar
    document.getElementById('cancel-btn').addEventListener('click', () => {
      window.electronAPI.closeObsWindow(savedObs);
    });
    
    // Auto-focus no textarea
    textarea.focus();
  </script>
</body>
</html>
